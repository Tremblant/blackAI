# ─────────────────────────────────────────────────────────
#  blackAI — AI Infrastructure Notes by Tiberius Asiago
#  Built on Lanyon (https://github.com/poole/lanyon)
# ─────────────────────────────────────────────────────────

# Site settings
title:            "blackAI"
tagline:          "AI Infrastructure Notes from Africa"
description:      "Deep dives into MLOps, AI infrastructure, GPU systems, and production ML from an engineer building from Nairobi."
url:              "https://Tiberius-Asiago.github.io"
baseurl:          "/blackAI"

# Author
author:
  name:           "Tiberius Asiago"
  email:          "tibeasiago@gmail.com"
  linkedin:       "https://www.linkedin.com/in/tiberiusasiago"
  github:         "https://github.com/Tiberius-Asiago"

# Build settings
markdown:         kramdown
highlighter:      rouge
permalink:        /:year/:month/:day/:title/
paginate:         5
paginate_path:    "/page:num/"

# Lanyon theme settings
# Theme options: https://github.com/poole/lanyon#themes
# Uncomment the theme you want:
# theme_color: "theme-base-08"  # red
# theme_color: "theme-base-09"  # orange
# theme_color: "theme-base-0b"  # green
# theme_color: "theme-base-0d"  # blue (default/none)
# theme_color: "theme-base-0e"  # magenta
# theme_color: "theme-base-0f"  # brown

# Layout options
# layout_reverse: true      # Flip sidebar to right side
# sidebar_overlay: true     # Sidebar overlays instead of pushing content

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-feed

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - README.md

# Collections (for categories and tags)
collections:
  categories:
    output: true
  tags:
    output: true
