<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080c10;
    --panel: #0d1520;
    --border: #1a2a3a;
    --green: #00e5a0;
    --green-dim: #00b37a;
    --blue: #00aaff;
    --orange: #ff8c00;
    --red: #ff4444;
    --text: #c8d8e8;
    --dim: #4a6070;
    --font: 'JetBrains Mono', monospace;
  }

  body {
    background: var(--bg);
    font-family: var(--font);
    color: var(--text);
    padding: 24px 16px;
    min-height: 500px;
  }

  .title {
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 28px;
    letter-spacing: -0.02em;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--font);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn:hover, .btn.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,229,160,0.06);
  }

  /* ── Main diagram ── */
  .diagram {
    position: relative;
    max-width: 820px;
    margin: 0 auto;
  }

  svg#flow {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ── Metrics bar ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 820px;
    margin: 20px auto 0;
  }

  .metric-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 12px;
    text-align: center;
  }

  .metric-label {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .metric-value {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--green);
    transition: all 0.4s;
  }

  .metric-unit {
    font-size: 0.65rem;
    color: var(--dim);
    margin-top: 2px;
  }

  /* ── SVG element styles ── */
  .node-box {
    fill: var(--panel);
    stroke: var(--border);
    stroke-width: 1;
    rx: 3;
    transition: all 0.3s;
  }

  .node-box.active {
    stroke: var(--green);
    filter: drop-shadow(0 0 8px rgba(0,229,160,0.4));
  }

  .node-label {
    fill: var(--text);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
  }

  .node-sub {
    fill: var(--dim);
    font-family: var(--font);
    font-size: 9px;
  }

  .conn-line {
    stroke: var(--border);
    stroke-width: 1.5;
    fill: none;
  }

  /* Pulse dot animation */
  @keyframes pulse-travel {
    0%   { opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .pulse-dot {
    opacity: 0;
  }

  .pulse-dot.active {
    animation: pulse-travel 1.8s ease-in-out infinite;
  }

  /* HPA scale animation */
  @keyframes hpa-spawn {
    0%   { opacity: 0; transform: scale(0.7) translateY(8px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .pod-extra {
    opacity: 0;
    transition: opacity 0.6s;
  }

  .pod-extra.visible {
    opacity: 1;
    animation: hpa-spawn 0.5s ease-out forwards;
  }

  /* Metrics flow */
  @keyframes metrics-pulse {
    0%, 100% { opacity: 0.3; }
    50%       { opacity: 1; }
  }
  .metrics-flow { animation: metrics-pulse 2s ease-in-out infinite; }

  /* Alert flash */
  @keyframes alert-flash {
    0%, 100% { fill: #ff444430; stroke: #ff4444; }
    50%       { fill: #ff444460; stroke: #ff6666; }
  }
  .alert-box { animation: alert-flash 1s ease-in-out infinite; }

  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.68rem;
    color: var(--dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
</style>
</head>
<body>

<p class="title">Interactive Architecture Diagram</p>
<p class="subtitle">ML Platform — Live Traffic Flow</p>

<div class="controls">
  <button class="btn active" onclick="setScene('idle')">Idle State</button>
  <button class="btn" onclick="setScene('request')">Incoming Request</button>
  <button class="btn" onclick="setScene('scale')">HPA Scaling</button>
  <button class="btn" onclick="setScene('metrics')">Metrics Flow</button>
</div>

<div class="diagram">
<svg id="flow" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1a2a3a"/>
    </marker>
    <marker id="arr-green" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00e5a0"/>
    </marker>
    <marker id="arr-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00aaff"/>
    </marker>
    <marker id="arr-orange" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ff8c00"/>
    </marker>

    <!-- Glow filters -->
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Pulse gradients -->
    <radialGradient id="pulse-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5a0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00e5a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pulse-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00aaff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00aaff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pulse-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8c00" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff8c00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Background grid ── -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0d1a24" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="420" fill="url(#grid)"/>

  <!-- ══════════════ NODES ══════════════ -->

  <!-- CLIENT -->
  <rect id="node-client" x="10" y="170" width="100" height="50" rx="3" class="node-box"/>
  <text x="60" y="191" text-anchor="middle" class="node-label">CLIENT</text>
  <text x="60" y="207" text-anchor="middle" class="node-sub">HTTP Request</text>

  <!-- Arrow: Client → K8s Service -->
  <path id="conn-1" d="M110,195 L190,195" class="conn-line" marker-end="url(#arr)"/>

  <!-- K8s SERVICE -->
  <rect id="node-svc" x="190" y="160" width="110" height="70" rx="3" class="node-box"/>
  <text x="245" y="183" text-anchor="middle" class="node-label">K8s SERVICE</text>
  <text x="245" y="198" text-anchor="middle" class="node-sub">NodePort</text>
  <text x="245" y="212" text-anchor="middle" class="node-sub">:30080</text>
  <!-- K8s logo dots -->
  <circle cx="245" cy="223" r="2" fill="#1a6aaa" opacity="0.6"/>

  <!-- HPA -->
  <rect id="node-hpa" x="240" y="60" width="100" height="55" rx="3" class="node-box"/>
  <text x="290" y="80" text-anchor="middle" class="node-label">HPA</text>
  <text x="290" y="95" text-anchor="middle" class="node-sub">Horizontal Pod</text>
  <text x="290" y="108" text-anchor="middle" class="node-sub">Autoscaler</text>
  <!-- HPA → Service (monitors) -->
  <path d="M290,115 L290,160" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,3" fill="none"/>

  <!-- Arrow: Service → Pods -->
  <path id="conn-2" d="M300,185 L380,155" class="conn-line" marker-end="url(#arr)"/>
  <path id="conn-2b" d="M300,195 L380,195" class="conn-line" marker-end="url(#arr)"/>

  <!-- POD 1 -->
  <rect id="node-pod1" x="380" y="133" width="120" height="62" rx="3" class="node-box"/>
  <text x="440" y="153" text-anchor="middle" class="node-label">POD 1</text>
  <text x="440" y="168" text-anchor="middle" class="node-sub">FastAPI</text>
  <text x="440" y="182" text-anchor="middle" class="node-sub">Container</text>

  <!-- POD 2 (appears on scale) -->
  <g id="pod2-group" class="pod-extra">
    <rect id="node-pod2" x="380" y="205" width="120" height="62" rx="3" class="node-box"/>
    <text x="440" y="225" text-anchor="middle" class="node-label">POD 2</text>
    <text x="440" y="240" text-anchor="middle" class="node-sub">FastAPI</text>
    <text x="440" y="254" text-anchor="middle" class="node-sub">Container</text>
  </g>

  <!-- Arrow: Pods → Model Volume -->
  <path id="conn-3" d="M500,165 L570,165" class="conn-line" marker-end="url(#arr)"/>

  <!-- MODEL VOLUME -->
  <rect id="node-vol" x="570" y="133" width="120" height="62" rx="3" class="node-box"/>
  <text x="630" y="153" text-anchor="middle" class="node-label">MODEL VOL</text>
  <text x="630" y="168" text-anchor="middle" class="node-sub">/data/models</text>
  <text x="630" y="182" text-anchor="middle" class="node-sub">NVMe (sdc)</text>

  <!-- Arrow: Pods → Prometheus -->
  <path id="conn-4" d="M440,133 L440,60 L560,60" class="conn-line" marker-end="url(#arr)"/>

  <!-- PROMETHEUS -->
  <rect id="node-prom" x="560" y="35" width="110" height="50" rx="3" class="node-box"/>
  <text x="615" y="55" text-anchor="middle" class="node-label">PROMETHEUS</text>
  <text x="615" y="70" text-anchor="middle" class="node-sub">Metrics scrape</text>

  <!-- Arrow: Prometheus → Grafana -->
  <path id="conn-5" d="M670,60 L720,60" class="conn-line" marker-end="url(#arr)"/>

  <!-- GRAFANA -->
  <rect id="node-graf" x="720" y="35" width="70" height="50" rx="3" class="node-box"/>
  <text x="755" y="55" text-anchor="middle" class="node-label">GRAFANA</text>
  <text x="755" y="70" text-anchor="middle" class="node-sub">Dashboard</text>

  <!-- PV CLAIM -->
  <rect id="node-pvc" x="570" y="230" width="120" height="50" rx="3" class="node-box"/>
  <text x="630" y="250" text-anchor="middle" class="node-label">hostPath PVC</text>
  <text x="630" y="265" text-anchor="middle" class="node-sub">sdc → /data</text>
  <path d="M630,195 L630,230" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,3" fill="none"/>

  <!-- SYSTEM DISK NOTE -->
  <rect x="10" y="330" width="180" height="70" rx="3" fill="#0d1520" stroke="#1a2a3a" stroke-width="1"/>
  <text x="100" y="350" text-anchor="middle" class="node-label" fill="#4a6070">SYSTEM (sdb)</text>
  <text x="100" y="368" text-anchor="middle" class="node-sub">Docker Engine</text>
  <text x="100" y="383" text-anchor="middle" class="node-sub">Minikube • kubectl</text>
  <text x="100" y="396" text-anchor="middle" class="node-sub">OS Services</text>

  <rect x="210" y="330" width="180" height="70" rx="3" fill="#0d1520" stroke="#1a2a3a" stroke-width="1"/>
  <text x="300" y="350" text-anchor="middle" class="node-label" fill="#4a6070">APPS (sda)</text>
  <text x="300" y="368" text-anchor="middle" class="node-sub">Source Code</text>
  <text x="300" y="383" text-anchor="middle" class="node-sub">Dockerfiles</text>
  <text x="300" y="396" text-anchor="middle" class="node-sub">K8s Manifests</text>

  <rect x="410" y="330" width="180" height="70" rx="3" fill="#0d1520" stroke="#1a2a3a" stroke-width="1"/>
  <text x="500" y="350" text-anchor="middle" class="node-label" fill="#00e5a0">DATA (sdc)</text>
  <text x="500" y="368" text-anchor="middle" class="node-sub">model.pt • datasets</text>
  <text x="500" y="383" text-anchor="middle" class="node-sub">Docker images</text>
  <text x="500" y="396" text-anchor="middle" class="node-sub">Logs • Artifacts</text>

  <!-- ══════════════ PULSE DOTS ══════════════ -->
  <!-- Request flow: client → svc -->
  <circle id="p1" class="pulse-dot" r="5" fill="url(#pulse-green)" filter="url(#glow-green)">
    <animateMotion dur="1.8s" repeatCount="indefinite" begin="0s">
      <mpath href="#conn-1-path"/>
    </animateMotion>
  </circle>

  <!-- Invisible paths for animateMotion -->
  <path id="conn-1-path" d="M110,195 L190,195" fill="none" stroke="none"/>
  <path id="conn-2-path" d="M300,185 L380,155" fill="none" stroke="none"/>
  <path id="conn-3-path" d="M500,165 L570,165" fill="none" stroke="none"/>
  <path id="conn-4-path" d="M440,133 L440,60 L560,60" fill="none" stroke="none"/>
  <path id="conn-5-path" d="M670,60 L720,60" fill="none" stroke="none"/>

  <!-- ══════════════ LABELS ══════════════ -->
  <text x="400" y="415" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#1a3040" letter-spacing="0.1em">
    CLICK SCENARIOS ABOVE TO ANIMATE TRAFFIC FLOW
  </text>

</svg>
</div>

<!-- ── Animated pulse dots (JS-controlled) ── -->

<div class="metrics">
  <div class="metric-card">
    <div class="metric-label">Active Pods</div>
    <div class="metric-value" id="m-pods">1</div>
    <div class="metric-unit">replicas</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Req / sec</div>
    <div class="metric-value" id="m-rps">0</div>
    <div class="metric-unit">requests</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Model Latency</div>
    <div class="metric-value" id="m-lat">—</div>
    <div class="metric-unit">ms p95</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#00e5a0"></div> Data / Request Flow</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00aaff"></div> Control Plane</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff8c00"></div> Metrics / Observability</div>
</div>

<script>
const scenes = {
  idle: {
    pods: '1', rps: '0', lat: '—',
    activeNodes: ['node-client', 'node-vol'],
    flows: [],
    pod2: false,
    connColors: { 'conn-1': '#1a2a3a', 'conn-2': '#1a2a3a', 'conn-2b': '#1a2a3a', 'conn-3': '#1a2a3a', 'conn-4': '#1a2a3a', 'conn-5': '#1a2a3a' }
  },
  request: {
    pods: '1', rps: '24', lat: '38',
    activeNodes: ['node-client', 'node-svc', 'node-pod1', 'node-vol'],
    flows: ['conn-1', 'conn-2', 'conn-3'],
    pod2: false,
    connColors: { 'conn-1': '#00e5a0', 'conn-2': '#00e5a0', 'conn-2b': '#1a2a3a', 'conn-3': '#00e5a0', 'conn-4': '#1a2a3a', 'conn-5': '#1a2a3a' }
  },
  scale: {
    pods: '2', rps: '180', lat: '42',
    activeNodes: ['node-client', 'node-svc', 'node-pod1', 'node-pod2', 'node-hpa', 'node-vol'],
    flows: ['conn-1', 'conn-2', 'conn-2b', 'conn-3'],
    pod2: true,
    connColors: { 'conn-1': '#00e5a0', 'conn-2': '#00e5a0', 'conn-2b': '#00e5a0', 'conn-3': '#00e5a0', 'conn-4': '#1a2a3a', 'conn-5': '#1a2a3a' }
  },
  metrics: {
    pods: '2', rps: '180', lat: '42',
    activeNodes: ['node-pod1', 'node-pod2', 'node-prom', 'node-graf'],
    flows: ['conn-4', 'conn-5'],
    pod2: true,
    connColors: { 'conn-1': '#1a2a3a', 'conn-2': '#1a2a3a', 'conn-2b': '#1a2a3a', 'conn-3': '#1a2a3a', 'conn-4': '#ff8c00', 'conn-5': '#ff8c00' }
  }
};

// Animated moving dots
let animDots = [];

function clearDots() {
  animDots.forEach(d => d.remove());
  animDots = [];
}

function animateDot(pathId, color, delay, dur) {
  const svg = document.getElementById('flow');
  const path = document.getElementById(pathId + '-path');
  if (!path) return;

  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('r', '5');
  dot.setAttribute('fill', color);
  dot.setAttribute('opacity', '0');
  svg.appendChild(dot);
  animDots.push(dot);

  const len = path.getTotalLength ? path.getTotalLength() : 100;
  let start = null;
  const totalDur = dur * 1000;
  const delayMs = delay * 1000;

  function step(ts) {
    if (!start) start = ts;
    const elapsed = ts - start - delayMs;
    if (elapsed < 0) { requestAnimationFrame(step); return; }
    const t = (elapsed % totalDur) / totalDur;
    const pt = path.getPointAtLength ? path.getPointAtLength(t * len) : {x: 0, y: 0};
    dot.setAttribute('cx', pt.x);
    dot.setAttribute('cy', pt.y);
    // fade in/out
    const fade = t < 0.1 ? t/0.1 : t > 0.9 ? (1-t)/0.1 : 1;
    dot.setAttribute('opacity', fade * 0.9);
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function setScene(name) {
  const scene = scenes[name];
  if (!scene) return;

  // Update buttons
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  // Update metrics
  document.getElementById('m-pods').textContent = scene.pods;
  document.getElementById('m-rps').textContent = scene.rps;
  document.getElementById('m-lat').textContent = scene.lat;

  // Update node highlights
  document.querySelectorAll('.node-box').forEach(el => el.classList.remove('active'));
  scene.activeNodes.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('active');
  });

  // Update connection colors
  Object.entries(scene.connColors).forEach(([id, color]) => {
    const el = document.getElementById(id);
    if (el) el.setAttribute('stroke', color);
  });

  // Pod 2 visibility
  const pod2 = document.getElementById('pod2-group');
  if (scene.pod2) pod2.classList.add('visible');
  else pod2.classList.remove('visible');

  // Animated dots
  clearDots();
  const dotColors = { 'conn-1': '#00e5a0', 'conn-2': '#00e5a0', 'conn-2b': '#00e5a0', 'conn-3': '#00e5a0', 'conn-4': '#ff8c00', 'conn-5': '#ff8c00' };
  scene.flows.forEach((flow, i) => {
    const color = dotColors[flow] || '#00e5a0';
    animateDot(flow, color, i * 0.3, 1.6);
  });
}
</script>
</body>
</html>
